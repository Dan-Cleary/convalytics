<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Convalytics: Web and product analytics for Convex apps</title>
    <meta name="description" content="(Free) Web and product analytics for Convex apps" />
    <link rel="canonical" href="https://convalytics.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Convalytics: Web and product analytics for Convex apps" />
    <meta property="og:description" content="(Free) Web and product analytics for Convex apps" />
    <meta property="og:image" content="https://convalytics.dev/og.png" />
    <meta property="og:url" content="https://convalytics.dev" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Convalytics: Web and product analytics for Convex apps" />
    <meta name="twitter:description" content="(Free) Web and product analytics for Convex apps" />
    <meta name="twitter:image" content="https://convalytics.dev/og.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "SoftwareApplication",
            "name": "Convalytics",
            "description": "(Free) Web and product analytics for Convex apps",
            "url": "https://convalytics.dev",
            "applicationCategory": "DeveloperApplication",
            "operatingSystem": "Any",
            "offers": {
              "@type": "Offer",
              "price": "0",
              "priceCurrency": "USD"
            }
          },
          {
            "@type": "Organization",
            "name": "Convalytics",
            "url": "https://convalytics.dev",
            "logo": "https://convalytics.dev/icons/convalytics-512.png",
            "contactPoint": {
              "@type": "ContactPoint",
              "email": "hello@convalytics.dev",
              "contactType": "customer support",
              "availableLanguage": ["English"]
            },
            "sameAs": [
              "https://github.com/Dan-Cleary/convalytics",
              "https://github.com/Dan-Cleary/convalytics-convex-component",
              "https://www.npmjs.com/package/convalytics",
              "https://x.com/DanJCleary"
            ]
          },
          {
            "@type": "WebPage",
            "url": "https://convalytics.dev",
            "name": "Convalytics: Web and product analytics for Convex apps",
            "speakable": {
              "@type": "SpeakableSpecification",
              "cssSelector": ["h1", "h2", "[data-speakable]"]
            }
          }
        ]
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/index.css" />
    <style>
      /* Prerendered marketing content is for crawlers and no-JS clients.
         When JS runs, we tag the root with .js-ready and CSS hides it so
         React can render the interactive UI without a duplicate flash. */
      .js-ready #seo-content {
        display: none;
      }
    </style>
  </head>
  <body>
    <script>
      document.documentElement.classList.add("js-ready");
    </script>
    <div id="seo-content"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

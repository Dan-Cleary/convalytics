name: Uptime check

on:
  schedule:
    # Every 10 minutes. GitHub cron minimum granularity is 5 min but delivery
    # is best-effort; 10 min is a reasonable balance of signal and quota.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Force the job to fail (for testing Slack alerts)"
        type: boolean
        default: false

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check /health
        run: |
          set -euo pipefail
          if [ "${{ inputs.force_fail }}" = "true" ]; then
            echo "::error::Forced failure for alert testing"
            exit 1
          fi
          URL="https://basic-goshawk-557.convex.site/health"
          status=$(curl -sS -o /tmp/body -w "%{http_code}" --max-time 10 "$URL" || true)
          echo "HTTP $status"
          cat /tmp/body || true
          echo
          if [ "$status" != "200" ]; then
            echo "::error::Health check failed: HTTP $status"
            exit 1
          fi

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST -H 'Content-Type: application/json' \
            --data "{\"text\":\":rotating_light: Convalytics uptime check FAILED — <${RUN_URL}|view run>\"}" \
            "$SLACK_WEBHOOK_URL"

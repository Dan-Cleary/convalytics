name: Uptime check

on:
  schedule:
    # TEMP: every 5 min + force_fail default true to test Slack failure alerts.
    # REVERT after testing: back to */10 and default: false.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Force the job to fail (for testing Slack alerts)"
        type: boolean
        default: true

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check /health
        run: |
          set -euo pipefail
          # TEMP: force fail unless explicitly disabled. Revert this block after testing.
          if [ "${{ inputs.force_fail }}" != "false" ]; then
            echo "::error::Forced failure for alert testing"
            exit 1
          fi
          URL="https://basic-goshawk-557.convex.site/health"
          status=$(curl -sS -o /tmp/body -w "%{http_code}" --max-time 10 "$URL" || true)
          echo "HTTP $status"
          cat /tmp/body || true
          echo
          if [ "$status" != "200" ]; then
            echo "::error::Health check failed: HTTP $status"
            exit 1
          fi

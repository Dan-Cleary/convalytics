name: Uptime check

on:
  schedule:
    # Once a day at 14:00 UTC (10am ET / 7am PT).
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Force the job to fail (for testing Slack alerts)"
        type: boolean
        default: false

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check /health
        run: |
          set -euo pipefail
          if [ "${{ inputs.force_fail }}" = "true" ]; then
            echo "::error::Forced failure for alert testing"
            exit 1
          fi
          URL="https://api.convalytics.dev/health"
          status=$(curl -sS -o /tmp/body -w "%{http_code}" --max-time 10 "$URL" || true)
          echo "HTTP $status"
          cat /tmp/body || true
          echo
          if [ "$status" != "200" ]; then
            echo "::error::Health check failed: HTTP $status"
            exit 1
          fi

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (frontend)
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --ext ts,tsx --report-unused-disable-directives --max-warnings 0

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  check-component:
    name: Typecheck component
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck component
        run: npx tsc --noEmit
        working-directory: component
